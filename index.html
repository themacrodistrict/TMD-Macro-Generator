<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#080808;color:white;font-family:-apple-system,Arial;padding:18px}
input,select,button{width:100%;padding:14px;margin:7px 0;border-radius:14px;border:none;font-size:16px;box-sizing:border-box}
button{background:#d6b887;color:#111;font-weight:900}

.preview{width:100%;display:flex;justify-content:center;overflow:hidden;margin-top:20px}
.preview-inner{width:1080px;height:1920px;transform-origin:top left}

.card{
  width:1080px;height:1920px;position:relative;overflow:hidden;
  padding:90px 70px;box-sizing:border-box;
  background:radial-gradient(circle at top,#4a3520 0%,transparent 38%),#080808;
}

.watermark{
  position:absolute;width:950px;opacity:.06;top:65%;left:50%;
  transform:translate(-50%,-50%);z-index:0;pointer-events:none;
}

.content{position:relative;z-index:2;text-align:center}

.hook{
  display:inline-block;padding:18px 34px;border-radius:999px;
  font-size:30px;font-weight:950;letter-spacing:2px;
  background:#d6b887;color:#111;
}

.title{
  margin-top:90px;font-size:78px;font-weight:1000;
  line-height:1.02;text-transform:uppercase;
}

.subtitle{margin-top:24px;font-size:42px;color:#d6b887;opacity:.95}

.kcal-badge{
  margin:90px auto 0;width:560px;height:560px;border-radius:50%;
  background:#d6b887;color:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 140px rgba(214,184,135,.6);
}

.kcal{font-size:140px;font-weight:1000;line-height:1}
.kcal-label{font-size:42px;font-weight:950;margin-top:8px}
.portion{font-size:24px;font-weight:800;margin-top:10px;opacity:.68}

.macros{
  margin-top:95px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;
}

.macro{
  background:#151515;border:2px solid #3d3024;
  border-radius:999px;padding:26px;
}

.label{font-size:20px;font-weight:900;color:#d6b887}
.value{font-size:42px;font-weight:1000;margin-top:6px}

.footer{
  position:absolute;bottom:70px;left:0;width:100%;
  display:flex;justify-content:center;align-items:center;z-index:2;
}

.footer-inner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  transform:translateX(-6px);
}

.icon{
  width:20px;height:20px;fill:#d6b887;opacity:.85;
  filter:drop-shadow(0 0 6px rgba(214,184,135,.35));
}

.youtube{
  width:24px;
  height:24px;
}

.handle{font-size:28px;opacity:.8;margin-left:6px}
</style>
</head>

<body>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="portion" placeholder="z.B. pro Portion">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fat">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

function resizePreview(){
  const scale = Math.min((window.innerWidth-40)/1080,(window.innerHeight-40)/1920,0.55);
  const el = $("previewInner");
  el.style.transform = `scale(${scale})`;
  el.style.width = `${1080*scale}px`;
  el.style.height = `${1920*scale}px`;
}

function fitTitle(){
  const t = document.querySelector(".title");
  if(!t) return;
  const l = t.innerText.length;
  if(l > 28) t.style.fontSize = "54px";
  else if(l > 20) t.style.fontSize = "64px";
  else t.style.fontSize = "78px";
}

function cleanFilename(name){
  return name.toLowerCase().trim()
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-+|-+$/g,"");
}

function render(){
  const format = v("format");

  const hook = v("hook") ? `<div class="hook">${v("hook")}</div>` : "";
  const title = v("name") ? `<div class="title">${v("name")}</div>` : "";
  const subtitle = v("subtitle") ? `<div class="subtitle">${v("subtitle")}</div>` : "";

  const kcalBox = v("kcal") ? `
    <div class="kcal-badge">
      <div class="kcal">${v("kcal")}</div>
      <div class="kcal-label">KCAL</div>
      ${v("portion") ? `<div class="portion">${v("portion")}</div>` : ""}
    </div>
  ` : "";

  const macros = (v("protein") || v("carbs") || v("fat")) ? `
    <div class="macros">
      ${v("protein") ? `<div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein")}</div></div>` : ""}
      ${v("carbs") ? `<div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs")}</div></div>` : ""}
      ${v("fat") ? `<div class="macro"><div class="label">FAT</div><div class="value">${v("fat")}</div></div>` : ""}
    </div>
  ` : "";

  $("card").innerHTML = `
    <img src="watermark.png" class="watermark">

    <div class="content">
      ${hook}
      ${title}
      ${subtitle}
      ${kcalBox}
      ${format === "card" ? macros : ""}
    </div>

    <div class="footer">
      <div class="footer-inner">
        <svg class="icon" viewBox="0 0 24 24"><path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm0 2a3 3 0 100 6 3 3 0 000-6z"/></svg>
        <svg class="icon" viewBox="0 0 24 24"><path d="M14 3v10.2a3.8 3.8 0 11-3-3.7v2.1a1.7 1.7 0 102 1.6V3h1z"/></svg>
        <svg class="icon youtube" viewBox="0 0 24 24"><path d="M21.6 7.2c-.2-.8-.8-1.4-1.6-1.6C18.6 5.2 12 5.2 12 5.2s-6.6 0-8 .4c-.8.2-1.4.8-1.6 1.6C2 8.6 2 12 2 12s0 3.4.4 4.8c.2.8.8 1.4 1.6 1.6 1.4.4 8 .4 8 .4s6.6 0 8-.4c.8-.2 1.4-.8 1.6-1.6.4-1.4.4-4.8.4-4.8s0-3.4-.4-4.8zM10 15.2V8.8l5.5 3.2L10 15.2z"/></svg>
        <span class="handle">@TheMacroDistrict</span>
      </div>
    </div>
  `;

  fitTitle();
  resizePreview();
}

function download(){
  render();

  const recipeName = v("name") || "tmd-card";
  const filename = cleanFilename(recipeName) + ".png";

  const clone = $("card").cloneNode(true);
  clone.style.transform = "none";
  clone.style.width = "1080px";
  clone.style.height = "1920px";
  clone.style.position = "fixed";
  clone.style.left = "-9999px";

  document.body.appendChild(clone);

  html2canvas(clone,{scale:2,useCORS:true}).then(canvas=>{
    const link=document.createElement("a");
    link.download = filename;
    link.href = canvas.toDataURL("image/png");
    link.click();
    document.body.removeChild(clone);
  });
}

window.addEventListener("resize",resizePreview);
render();
</script>

</body>
</html>
