<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:-apple-system,Arial;
  padding:18px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#d6b887;
  color:#111;
  font-weight:900;
}

/* PREVIEW */
.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

/* CARD */
.card{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  padding:90px 70px;
  box-sizing:border-box;

  background:
    radial-gradient(circle at top,#4a3520 0%,transparent 38%),
    #080808;
}

/* 🔥 FINAL WATERMARK */
.watermark{
  position:absolute;
  width:1030px;
  opacity:.095;
  top:66%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  filter:brightness(1.12);
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

.hook{
  display:inline-block;
  padding:18px 34px;
  border-radius:999px;
  font-size:30px;
  font-weight:950;
  letter-spacing:2px;
  background:#d6b887;
  color:#111;
}

.title{
  margin-top:90px;
  font-size:78px;
  font-weight:1000;
  line-height:1.02;
  text-transform:uppercase;
}

.subtitle{
  margin-top:24px;
  font-size:42px;
  color:#d6b887;
  opacity:.95;
}

.kcal-badge{
  margin:90px auto 0;
  width:560px;
  height:560px;
  border-radius:50%;
  background:#d6b887;
  color:#111;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  box-shadow:0 0 140px rgba(214,184,135,.6);
}

.kcal{
  font-size:140px;
  font-weight:1000;
}

.kcal-label{
  font-size:42px;
  font-weight:950;
}

.portion{
  font-size:24px;
  font-weight:800;
  margin-top:10px;
  opacity:.7;
}

/* 🔥 IMPROVED MACROS */
.macros{
  margin-top:75px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:22px;
}

.macro{
  background:#151515;
  border:2px solid #3d3024;
  border-radius:999px;
  padding:30px 26px;
}

.label{
  font-size:22px;
  font-weight:900;
  color:#d6b887;
}

.value{
  font-size:48px;
  font-weight:1000;
  margin-top:6px;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:70px;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.footer-inner{
  display:flex;
  align-items:center;
  gap:14px;
}

.icon{
  width:23px;
  height:23px;
  fill:#d6b887;
  opacity:.8;
}

.youtube{
  width:26px;
  height:26px;
}

.handle{
  font-size:28px;
  opacity:.95;
  margin-left:10px;
}
</style>
</head>

<body>

<input id="hook" placeholder="Hook">
<input id="name" placeholder="Name">
<input id="kcal" placeholder="Kalorien">
<input id="portion" placeholder="z.B. pro Portion">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fat">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

function cleanFilename(name){
  return name.toLowerCase().replace(/[^a-z0-9]+/g,"-");
}

function render(){

  const hook = v("hook") ? `<div class="hook">${v("hook")}</div>` : "";
  const title = v("name") ? `<div class="title">${v("name")}</div>` : "";

  const kcalBox = v("kcal") ? `
    <div class="kcal-badge">
      <div class="kcal">${v("kcal")}</div>
      <div class="kcal-label">KCAL</div>
      ${v("portion") ? `<div class="portion">${v("portion")}</div>` : ""}
    </div>
  ` : "";

  const macros = (v("protein") || v("carbs") || v("fat")) ? `
    <div class="macros">
      ${v("protein") ? `<div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein")}</div></div>` : ""}
      ${v("carbs") ? `<div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs")}</div></div>` : ""}
      ${v("fat") ? `<div class="macro"><div class="label">FAT</div><div class="value">${v("fat")}</div></div>` : ""}
    </div>
  ` : "";

  $("card").innerHTML = `
    <img src="watermark.png" class="watermark">

    <div class="content">
      ${hook}
      ${title}
      ${kcalBox}
      ${macros}
    </div>

    <div class="footer">
      <div class="footer-inner">

        <svg class="icon" viewBox="0 0 24 24">
          <rect x="4" y="4" width="16" height="16" rx="5"/>
          <circle cx="12" cy="12" r="4" fill="#080808"/>
          <circle cx="17" cy="7" r="1.5" fill="#080808"/>
        </svg>

        <svg class="icon" viewBox="0 0 24 24">
          <path d="M14 3v9a4 4 0 11-3-3.87V10a2 2 0 102 1.73V3h1z"/>
        </svg>

        <svg class="icon youtube" viewBox="0 0 24 24">
          <rect x="2" y="6" width="20" height="12" rx="4" fill="#d6b887"/>
          <polygon points="10,9 16,12 10,15" fill="#080808"/>
        </svg>

        <span class="handle">@TheMacroDistrict</span>

      </div>
    </div>
  `;
}

function download(){
  render();

  const filename = cleanFilename(v("name") || "tmd") + ".png";

  html2canvas($("card"),{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download = filename;
    link.href = canvas.toDataURL();
    link.click();
  });
}

render();
</script>

</body>
</html>
