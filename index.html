<!-- V3 TMD Macro Generator -->
<!-- Datei: index.html -->
<!-- Logo muss heißen: logo.png -->

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Macro Generator V3</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:-apple-system,Arial,sans-serif;
  padding:18px;
}

.app{max-width:100%;margin:auto}

input,select,button{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
}

button{
  background:#d6b887;
  color:#111;
  font-weight:900;
}

.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

.card{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  box-sizing:border-box;
  padding:80px;
}

.logo-bg{
  position:absolute;
  width:760px;
  opacity:.06;
  top:260px;
  left:160px;
}

.logo{
  width:190px;
  display:block;
  margin:0 auto 55px auto;
  opacity:.75;
}

.hook{
  display:inline-block;
  padding:18px 34px;
  border-radius:999px;
  font-size:30px;
  font-weight:950;
  letter-spacing:2px;
}

.title{
  margin-top:95px;
  font-size:96px;
  font-weight:1000;
  line-height:.98;
  text-align:center;
  text-transform:uppercase;
}

.subtitle{
  margin-top:24px;
  font-size:38px;
  text-align:center;
  opacity:.85;
}

.kcal-badge{
  margin:120px auto 0 auto;
  width:620px;
  height:620px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.kcal{
  font-size:160px;
  font-weight:1000;
  line-height:1;
}

.kcal-label{
  font-size:46px;
  font-weight:950;
}

.macros{
  margin-top:95px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:22px;
}

.macro{
  border-radius:999px;
  padding:28px 10px;
  text-align:center;
}

.label{
  font-size:22px;
  font-weight:900;
  opacity:.7;
}

.value{
  margin-top:8px;
  font-size:42px;
  font-weight:1000;
}

.extras{
  margin-top:55px;
  font-size:30px;
  text-align:center;
  opacity:.8;
}

.footer{
  position:absolute;
  bottom:75px;
  left:0;
  right:0;
  text-align:center;
  font-size:32px;
  font-weight:950;
  opacity:.75;
}

/* HERO GLOW */
.hero{
  background:
    radial-gradient(circle at top,#4a3520 0%,transparent 36%),
    radial-gradient(circle at center,#1e1e1e 0%,#080808 72%);
}

.hero .hook,
.hero .kcal-badge{
  background:#d6b887;
  color:#111;
  box-shadow:0 0 90px rgba(214,184,135,.42);
}

.hero .macro{
  background:#171717;
  border:2px solid #3d3024;
}

.hero .subtitle,
.hero .label{
  color:#d6b887;
}

/* CREAM PREMIUM */
.cream{
  background:#f4eadc;
  color:#111;
}

.cream .hook,
.cream .kcal-badge{
  background:#111;
  color:#f4eadc;
  box-shadow:0 25px 80px rgba(0,0,0,.18);
}

.cream .macro{
  background:white;
  color:#111;
  box-shadow:0 16px 45px rgba(0,0,0,.1);
}

.cream .subtitle,
.cream .label,
.cream .footer{
  color:#9b7a52;
}

/* NEON GOLD */
.neon{
  background:
    linear-gradient(160deg,#090909,#18100a 55%,#090909);
}

.neon .hook{
  background:transparent;
  border:3px solid #d6b887;
  color:#d6b887;
  box-shadow:0 0 45px rgba(214,184,135,.35);
}

.neon .kcal-badge{
  background:linear-gradient(145deg,#d6b887,#f2d9a4);
  color:#111;
  box-shadow:0 0 120px rgba(214,184,135,.6);
}

.neon .macro{
  background:#111;
  border:2px solid #d6b887;
}

.neon .subtitle,
.neon .label{
  color:#d6b887;
}
</style>
</head>

<body>

<div class="app">

<h2>TMD Generator V3</h2>

<select id="design">
<option value="hero">Hero Glow</option>
<option value="cream">Cream Premium</option>
<option value="neon">Neon Gold</option>
</select>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook z.B. LOW CAL • HIGH PROTEIN">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">
<input id="extras" placeholder="Extras">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card hero"></div>
  </div>
</div>

</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

function resizePreview(){
  const inner = $("previewInner");

  const availableWidth = window.innerWidth - 40;
  const availableHeight = window.innerHeight - 40;

  const scale = Math.min(
    availableWidth / 1080,
    availableHeight / 1920,
    0.55
  );

  inner.style.width = `${1080 * scale}px`;
  inner.style.height = `${1920 * scale}px`;
  inner.style.transform = `scale(${scale})`;
}

function fitTitle(){
  const title = document.querySelector(".title");
  const len = title.innerText.length;

  if(len > 30) title.style.fontSize = "60px";
  else if(len > 22) title.style.fontSize = "72px";
  else if(len > 15) title.style.fontSize = "84px";
  else title.style.fontSize = "96px";
}

function render(){
  const design = v("design");
  const format = v("format");
  const card = $("card");

  card.className = "card " + design;

  card.innerHTML = `
    <img src="logo.png" class="logo-bg">
    <img src="logo.png" class="logo">

    <div style="text-align:center;">
      <div class="hook">${v("hook") || "LOW CAL • HIGH PROTEIN"}</div>
    </div>

    <div class="title">${v("name") || "MAXI KING BOWL"}</div>
    <div class="subtitle">${v("subtitle") || "High Protein Dessert"}</div>

    <div class="kcal-badge">
      <div class="kcal">${v("kcal") || "317"}</div>
      <div class="kcal-label">KCAL</div>
    </div>

    ${
      format === "card" ? `
      <div class="macros">
        <div class="macro">
          <div class="label">PROTEIN</div>
          <div class="value">${v("protein") || "34g"}</div>
        </div>
        <div class="macro">
          <div class="label">CARBS</div>
          <div class="value">${v("carbs") || "16g"}</div>
        </div>
        <div class="macro">
          <div class="label">FETT</div>
          <div class="value">${v("fat") || "11g"}</div>
        </div>
      </div>
      <div class="extras">${v("extras") || ""}</div>
      `
      :
      `
      <div class="extras" style="font-size:60px;font-weight:1000;">
        ${v("protein") || "34g"} Protein
      </div>
      `
    }

    <div class="footer">@TheMacroDistrict</div>
  `;

  fitTitle();
  resizePreview();
}

function download(){
  render();

  html2canvas($("card"), {
    scale:2,
    useCORS:true,
    backgroundColor:null
  }).then(canvas=>{
    const link = document.createElement("a");
    link.download = "tmd-v3-card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

window.addEventListener("resize", resizePreview);
render();
</script>

</body>
</html>
