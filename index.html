<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator V3</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:-apple-system,Arial;
  padding:18px;
}

.app{max-width:100%;margin:auto}

input,select,button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
}

button{
  background:#d6b887;
  color:#111;
  font-weight:900;
}

/* PREVIEW */
.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

/* CARD */
.card{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  padding:80px;
  box-sizing:border-box;
}

/* 🔥 WATERMARK FULL SCREEN */
.logo-bg{
  position:absolute;
  width:1400px;
  opacity:.05;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:0;
  pointer-events:none;
}

/* ALLES DRÜBER */
.card > *:not(.logo-bg){
  position:relative;
  z-index:2;
}

/* ELEMENTS */
.hook{
  display:inline-block;
  padding:16px 30px;
  border-radius:999px;
  font-size:28px;
  font-weight:900;
  letter-spacing:2px;
}

.title{
  margin-top:100px;
  font-size:96px;
  font-weight:1000;
  text-align:center;
  line-height:1;
}

.subtitle{
  margin-top:20px;
  font-size:36px;
  text-align:center;
}

.kcal-badge{
  margin:120px auto 0 auto;
  width:600px;
  height:600px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.kcal{
  font-size:160px;
  font-weight:1000;
}

.kcal-label{
  font-size:44px;
  font-weight:900;
}

.macros{
  margin-top:90px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.macro{
  border-radius:999px;
  padding:25px;
  text-align:center;
}

.label{
  font-size:20px;
  font-weight:900;
  opacity:.7;
}

.value{
  font-size:40px;
  font-weight:1000;
}

.footer{
  position:absolute;
  bottom:70px;
  width:100%;
  text-align:center;
  font-size:30px;
  opacity:.7;
}

/* DESIGN HERO */
.hero{
  background:
    radial-gradient(circle at top,#4a3520 0%,transparent 40%),
    #080808;
}

.hero .hook{
  background:#d6b887;
  color:#111;
}

.hero .kcal-badge{
  background:#d6b887;
  color:#111;
  box-shadow:0 0 100px rgba(214,184,135,.5);
}

.hero .macro{
  background:#171717;
  border:2px solid #3d3024;
}

.hero .subtitle,
.hero .label{
  color:#d6b887;
}
</style>
</head>

<body>

<div class="app">

<h2>TMD Generator</h2>

<select id="design">
<option value="hero">Hero Glow</option>
</select>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook (LOW CAL • HIGH PROTEIN)">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card hero"></div>
  </div>
</div>

</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

/* RESPONSIVE */
function resizePreview(){
  const inner = $("previewInner");

  const scale = Math.min(
    (window.innerWidth - 40) / 1080,
    (window.innerHeight - 40) / 1920,
    0.55
  );

  inner.style.transform = `scale(${scale})`;
  inner.style.width = `${1080 * scale}px`;
  inner.style.height = `${1920 * scale}px`;
}

/* TITLE AUTO SIZE */
function fitTitle(){
  const t = document.querySelector(".title");
  const l = t.innerText.length;

  if(l > 28) t.style.fontSize = "60px";
  else if(l > 20) t.style.fontSize = "75px";
  else t.style.fontSize = "96px";
}

/* RENDER */
function render(){

  const format = v("format");
  const card = $("card");

  card.innerHTML = `
    <img src="logo.png" class="logo-bg">

    <div style="text-align:center;">
      <div class="hook">${v("hook") || "LOW CAL • HIGH PROTEIN"}</div>
    </div>

    <div class="title">${v("name") || "MAXI KING BOWL"}</div>
    <div class="subtitle">${v("subtitle") || "High Protein Dessert"}</div>

    <div class="kcal-badge">
      <div class="kcal">${v("kcal") || "317"}</div>
      <div class="kcal-label">KCAL</div>
    </div>

    ${
      format === "card" ? `
      <div class="macros">
        <div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein") || "34g"}</div></div>
        <div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs") || "16g"}</div></div>
        <div class="macro"><div class="label">FETT</div><div class="value">${v("fat") || "11g"}</div></div>
      </div>
      `
      :
      `
      <div style="margin-top:80px;text-align:center;font-size:60px;font-weight:1000;">
        ${v("protein") || "34g"} PROTEIN
      </div>
      `
    }

    <div class="footer">@TheMacroDistrict</div>
  `;

  fitTitle();
  resizePreview();
}

/* DOWNLOAD */
function download(){
  render();

  html2canvas($("card"), {scale:2}).then(canvas=>{
    const link = document.createElement("a");
    link.download = "tmd.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

window.addEventListener("resize", resizePreview);
render();
</script>

</body>
</html>
