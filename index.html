<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMD Macro Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#0b0b0c;color:white;font-family:Arial;padding:20px}
input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:0;font-size:16px}
button{background:#d6b887;font-weight:800;cursor:pointer}
.app{max-width:480px;margin:auto}

/* 🔥 KEIN SCALE MEHR */
.preview{
width:100%;
overflow:auto;
}

.card{
width:1080px;
height:1920px;
box-sizing:border-box;
position:relative;
overflow:hidden;
}

.logo{
width:210px;
opacity:.18;
margin-bottom:70px;
display:block;
margin-left:auto;
margin-right:auto;
}

.center{text-align:center}

.title{
font-size:80px;
font-weight:900;
line-height:1.1;
text-align:center;
}

.subtitle{
font-size:36px;
margin-top:20px;
text-align:center;
}

.kcal{
font-size:140px;
font-weight:900;
text-align:center;
}

.box{
border-radius:55px;
padding:60px;
margin-top:80px;
text-align:center;
}

.macros{
display:block; /* 🔥 stabil statt flex */
margin-top:60px;
text-align:center;
}

.macro{
margin-top:20px;
}

.label{
font-size:24px;
font-weight:800;
}

.value{
font-size:52px;
font-weight:900;
margin-top:10px;
}

.extras{
font-size:32px;
margin-top:60px;
text-align:center;
}

.footer{
position:absolute;
bottom:90px;
left:0;
right:0;
text-align:center;
font-size:30px;
font-weight:800;
}

/* Designs */
.luxury{background:#0d0d0e;color:white;padding:90px}
.luxury .subtitle,.luxury .label{color:#d6b887}
.luxury .box{border:4px solid #d6b887;background:#151515}
.luxury .footer{color:#8d8277}

.minimal{background:#f6f1e9;color:#111;padding:90px}
.minimal .subtitle,.minimal .label,.minimal .footer{color:#9b7a52}
.minimal .box{background:white;box-shadow:0 20px 50px rgba(0,0,0,.08)}

.social{background:#101010;color:white;padding:80px}
.social-inner{
height:1760px;
background:#181818;
border-radius:70px;
padding:70px;
box-sizing:border-box;
border:2px solid #2c241c
}
.social .subtitle,.social .label{color:#d6b887}
.social .box{background:#d6b887;color:#111}
.social .footer{color:#8d8277}
</style>
</head>

<body>

<div class="app">
<h1>TMD Macro Generator</h1>

<select id="design">
<option value="luxury">Luxury Dark</option>
<option value="minimal">Minimal Clean</option>
<option value="social">Social Card</option>
</select>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">
<input id="extras" placeholder="Extras">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
<div id="card" class="card luxury"></div>
</div>

</div>

<script>
function val(id){return document.getElementById(id).value}

function render(){
 const design = val("design");
 const format = val("format");
 const card = document.getElementById("card");

 card.className = "card " + design;

 const content = `
 ${design === "social" ? '<div class="social-inner">' : ''}

 <img src="logo.png" class="logo">

 <div class="title">${val("name") || "Rezeptname"}</div>

 <div class="subtitle">
 ${val("subtitle") || "High Protein Dessert"}
 </div>

 <div class="box">
 <div class="kcal">${val("kcal") || "317"}</div>
 <div class="subtitle">kcal</div>
 </div>

 ${
 format === "card" ? `
 <div class="macros">
 <div class="macro"><div class="label">PROTEIN</div><div class="value">${val("protein") || "34g"}</div></div>
 <div class="macro"><div class="label">CARBS</div><div class="value">${val("carbs") || "16,8g"}</div></div>
 <div class="macro"><div class="label">FETT</div><div class="value">${val("fat") || "11,7g"}</div></div>
 </div>

 <div class="extras">${val("extras") || ""}</div>
 ` : `
 <div class="extras" style="font-size:55px;font-weight:900;">
 ${val("protein") || "34g"} Protein
 </div>
 `
 }

 <div class="footer">@TheMacroDistrict</div>

 ${design === "social" ? '</div>' : ''}
 `;

 card.innerHTML = content;
}

function download(){
 render();
 html2canvas(document.getElementById("card"), {
   scale: 2, // 🔥 wichtig für sauberes Bild
   useCORS: true,
   backgroundColor: null
 }).then(canvas => {
   const link = document.createElement("a");
   link.download = "tmd-macro-card.png";
   link.href = canvas.toDataURL("image/png");
   link.click();
 });
}

render();
</script>

</body>
</html>
