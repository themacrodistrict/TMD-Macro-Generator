<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:-apple-system,Arial;
  padding:18px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#d6b887;
  color:#111;
  font-weight:900;
}

/* PREVIEW */
.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

/* CARD */
.card{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  padding:90px 70px;
  box-sizing:border-box;

  background:
    radial-gradient(circle at top,#4a3520 0%,transparent 38%),
    #080808;
}

/* 🔥 WATERMARK */
.watermark{
  position:absolute;
  width:950px;
  opacity:.08;
  top:65%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:0;
  pointer-events:none;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* ELEMENTS */
.hook{
  display:inline-block;
  padding:18px 34px;
  border-radius:999px;
  font-size:30px;
  font-weight:950;
  letter-spacing:2px;
  background:#d6b887;
  color:#111;
}

.title{
  margin-top:110px;
  font-size:78px;
  font-weight:1000;
  line-height:1.02;
  text-transform:uppercase;
}

.subtitle{
  margin-top:24px;
  font-size:38px;
  color:#d6b887;
}

.kcal-badge{
  margin:110px auto 0;
  width:560px;
  height:560px;
  border-radius:50%;
  background:#d6b887;
  color:#111;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  box-shadow:0 0 140px rgba(214,184,135,.6);
}

.kcal{
  font-size:140px;
  font-weight:1000;
}

.kcal-label{
  font-size:42px;
  font-weight:950;
}

.macros{
  margin-top:100px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.macro{
  background:#151515;
  border:2px solid #3d3024;
  border-radius:999px;
  padding:26px;
}

.label{
  font-size:20px;
  font-weight:900;
  color:#d6b887;
}

.value{
  font-size:42px;
  font-weight:1000;
  margin-top:6px;
}

/* 🔥 FOOTER */
.footer{
  position:absolute;
  bottom:70px;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-size:28px;
  opacity:.75;
}

/* 🔥 GOLD ICONS */
.icon{
  width:22px;
  height:22px;
  fill:#d6b887;
  opacity:.8;
  filter:drop-shadow(0 0 6px rgba(214,184,135,.35));
}
</style>
</head>

<body>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook (LOW CAL • HIGH PROTEIN)">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

/* PREVIEW SCALE */
function resizePreview(){
  const scale = Math.min(
    (window.innerWidth - 40) / 1080,
    (window.innerHeight - 40) / 1920,
    0.55
  );

  const el = $("previewInner");
  el.style.transform = `scale(${scale})`;
  el.style.width = `${1080 * scale}px`;
  el.style.height = `${1920 * scale}px`;
}

/* TITLE AUTO SIZE */
function fitTitle(){
  const t = document.querySelector(".title");
  const l = t.innerText.length;

  if(l > 28) t.style.fontSize = "54px";
  else if(l > 20) t.style.fontSize = "64px";
  else t.style.fontSize = "78px";
}

/* RENDER */
function render(){
  const format = v("format");

  $("card").innerHTML = `
    <img src="watermark.png" class="watermark">

    <div class="content">
      <div class="hook">${v("hook") || "LOW CAL • HIGH PROTEIN"}</div>

      <div class="title">${v("name") || "MAXI KING BOWL"}</div>
      <div class="subtitle">${v("subtitle") || "High Protein Dessert"}</div>

      <div class="kcal-badge">
        <div class="kcal">${v("kcal") || "317"}</div>
        <div class="kcal-label">KCAL</div>
      </div>

      ${
        format === "card" ? `
        <div class="macros">
          <div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein") || "34g"}</div></div>
          <div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs") || "16g"}</div></div>
          <div class="macro"><div class="label">FETT</div><div class="value">${v("fat") || "11g"}</div></div>
        </div>
        `
        :
        `
        <div style="margin-top:100px;font-size:60px;font-weight:1000;">
          ${v("protein") || "34g"} PROTEIN
        </div>
        `
      }
    </div>

    <div class="footer">

      <!-- Instagram -->
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 
        5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm6.5-.8a1.2 
        1.2 0 110 2.4 1.2 1.2 0 010-2.4zM12 9a3 3 0 100 6 3 3 0 000-6z"/>
      </svg>

      <!-- TikTok -->
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M14 3v10.2a3.8 3.8 0 11-3-3.7v2.1a1.7 1.7 0 102 
        1.6V3h1z"/>
      </svg>

      <!-- YouTube -->
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M23 7s-.2-1.7-.8-2.4c-.8-.9-1.7-.9-2.1-1C17.2 
        3 12 3 12 3h0s-5.2 0-8.1.2c-.4.1-1.3.1-2.1 1C1.2 
        5.3 1 7 1 7S1 8.8 1 10.6v1.8C1 14.2 1 
        16 1 16s.2 1.7.8 2.4c.8.9 1.9.9 2.4 
        1 1.8.2 7.8.2 7.8.2s5.2 0 8.1-.2c.4-.1 
        1.3-.1 2.1-1 .6-.7.8-2.4.8-2.4s0-1.8 
        0-3.6v-1.8C23 8.8 23 7 23 7zM10 
        14.5v-5l5 2.5-5 2.5z"/>
      </svg>

      <span>@TheMacroDistrict</span>
    </div>
  `;

  fitTitle();
  resizePreview();
}

/* EXPORT FIX */
function download(){
  render();

  const clone = $("card").cloneNode(true);
  clone.style.transform = "none";
  clone.style.width = "1080px";
  clone.style.height = "1920px";
  clone.style.position = "fixed";
  clone.style.left = "-9999px";

  document.body.appendChild(clone);

  html2canvas(clone,{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="tmd.png";
    link.href=canvas.toDataURL();
    link.click();
    document.body.removeChild(clone);
  });
}

window.addEventListener("resize",resizePreview);
render();
</script>

</body>
</html>
