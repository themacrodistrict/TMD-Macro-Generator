<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:-apple-system,Arial;
  padding:18px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#d6b887;
  color:#111;
  font-weight:900;
}

/* PREVIEW */
.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

/* CARD */
.card{
  width:1080px;
  height:1920px;
  position:relative;
  overflow:hidden;
  padding:90px 70px;
  box-sizing:border-box;

  background:
    radial-gradient(circle at top,#4a3520 0%,transparent 38%),
    #080808;
}

/* 🔥 WATERMARK CLEAN */
.watermark{
  position:absolute;
  width:900px;
  opacity:.07;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
}

.watermark-glow{
  position:absolute;
  width:1100px;
  opacity:.035;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.2);
  filter:blur(40px);
  z-index:0;
  pointer-events:none;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* ELEMENTS */
.hook{
  display:inline-block;
  padding:18px 34px;
  border-radius:999px;
  font-size:30px;
  font-weight:950;
  letter-spacing:2px;
  background:#d6b887;
  color:#111;
}

.title{
  margin-top:110px;
  font-size:78px;
  font-weight:1000;
  line-height:1.02;
  text-transform:uppercase;
}

.subtitle{
  margin-top:24px;
  font-size:38px;
  color:#d6b887;
}

.kcal-badge{
  margin:110px auto 0;
  width:560px;
  height:560px;
  border-radius:50%;
  background:#d6b887;
  color:#111;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  box-shadow:0 0 140px rgba(214,184,135,.6);
}

.kcal{
  font-size:140px;
  font-weight:1000;
}

.kcal-label{
  font-size:42px;
  font-weight:950;
}

.macros{
  margin-top:100px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.macro{
  background:#151515;
  border:2px solid #3d3024;
  border-radius:999px;
  padding:26px;
}

.label{
  font-size:20px;
  font-weight:900;
  color:#d6b887;
}

.value{
  font-size:42px;
  font-weight:1000;
  margin-top:6px;
}

.footer{
  position:absolute;
  bottom:70px;
  width:100%;
  text-align:center;
  font-size:30px;
  opacity:.7;
  z-index:2;
}
</style>
</head>

<body>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook (LOW CAL • HIGH PROTEIN)">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

/* RESPONSIVE PREVIEW */
function resizePreview(){
  const scale = Math.min(
    (window.innerWidth - 40) / 1080,
    (window.innerHeight - 40) / 1920,
    0.55
  );

  const el = $("previewInner");
  el.style.transform = `scale(${scale})`;
  el.style.width = `${1080 * scale}px`;
  el.style.height = `${1920 * scale}px`;
}

/* TITLE AUTO SIZE */
function fitTitle(){
  const t = document.querySelector(".title");
  const l = t.innerText.length;

  if(l > 28) t.style.fontSize = "54px";
  else if(l > 20) t.style.fontSize = "64px";
  else t.style.fontSize = "78px";
}

/* RENDER */
function render(){
  const format = v("format");

  $("card").innerHTML = `
    <img src="watermark.png" class="watermark-glow">
    <img src="watermark.png" class="watermark">

    <div class="content">
      <div class="hook">${v("hook") || "LOW CAL • HIGH PROTEIN"}</div>

      <div class="title">${v("name") || "MAXI KING BOWL"}</div>
      <div class="subtitle">${v("subtitle") || "High Protein Dessert"}</div>

      <div class="kcal-badge">
        <div class="kcal">${v("kcal") || "317"}</div>
        <div class="kcal-label">KCAL</div>
      </div>

      ${
        format === "card" ? `
        <div class="macros">
          <div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein") || "34g"}</div></div>
          <div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs") || "16g"}</div></div>
          <div class="macro"><div class="label">FETT</div><div class="value">${v("fat") || "11g"}</div></div>
        </div>
        `
        :
        `
        <div style="margin-top:100px;font-size:60px;font-weight:1000;">
          ${v("protein") || "34g"} PROTEIN
        </div>
        `
      }
    </div>

    <div class="footer">@TheMacroDistrict</div>
  `;

  fitTitle();
  resizePreview();
}

/* EXPORT FIX */
function download(){
  render();

  const clone = $("card").cloneNode(true);
  clone.style.transform = "none";
  clone.style.width = "1080px";
  clone.style.height = "1920px";
  clone.style.position = "fixed";
  clone.style.left = "-9999px";

  document.body.appendChild(clone);

  html2canvas(clone,{
    scale:2,
    useCORS:true,
    backgroundColor:null
  }).then(canvas=>{
    const link=document.createElement("a");
    link.download="tmd-card.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
    document.body.removeChild(clone);
  });
}

window.addEventListener("resize",resizePreview);
render();
</script>

</body>
</html>
