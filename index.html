<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMD Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#080808;color:white;font-family:-apple-system,Arial;padding:18px}
input,select,button{width:100%;box-sizing:border-box;padding:14px;margin:7px 0;border-radius:14px;border:0;font-size:16px}
button{background:#d6b887;color:#111;font-weight:900}

.preview{width:100%;display:flex;justify-content:center;overflow:hidden;margin-top:20px}
.preview-inner{width:1080px;height:1920px;transform-origin:top left}

.card{
  width:1080px;height:1920px;position:relative;overflow:hidden;
  box-sizing:border-box;padding:90px 70px;background:#080808;
  background:radial-gradient(circle at top,#4a3520 0%,transparent 38%),#080808;
}

.watermark{
  position:absolute;width:1450px;opacity:.045;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:0;pointer-events:none;
}

.content{position:relative;z-index:2;text-align:center}

.hook{
  display:inline-block;background:#d6b887;color:#111;
  padding:18px 34px;border-radius:999px;
  font-size:28px;font-weight:950;letter-spacing:1px;
  max-width:850px;
}

.title{
  margin-top:115px;font-size:78px;font-weight:1000;
  line-height:1.02;text-transform:uppercase;
  max-width:940px;margin-left:auto;margin-right:auto;
  word-break:normal;
}

.subtitle{
  margin-top:26px;font-size:38px;color:#d6b887;
}

.kcal-badge{
  margin:110px auto 0 auto;width:560px;height:560px;border-radius:50%;
  background:#d6b887;color:#111;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  box-shadow:0 0 90px rgba(214,184,135,.45);
}

.kcal{font-size:145px;font-weight:1000;line-height:1}
.kcal-label{font-size:42px;font-weight:950}

.macros{
  margin-top:105px;display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:22px;
}

.macro{
  background:#151515;border:2px solid #3d3024;border-radius:999px;
  padding:26px 8px;
}

.label{font-size:22px;font-weight:900;color:#d6b887}
.value{font-size:42px;font-weight:1000;margin-top:8px}

.footer{
  position:absolute;bottom:75px;left:0;right:0;text-align:center;
  font-size:32px;font-weight:900;opacity:.7;z-index:2;
}
</style>
</head>

<body>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="hook" placeholder="Hook">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fett">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

function resizePreview(){
  const scale = Math.min((window.innerWidth-40)/1080, .55);
  $("previewInner").style.transform = `scale(${scale})`;
  $("previewInner").style.width = `${1080*scale}px`;
  $("previewInner").style.height = `${1920*scale}px`;
}

function fitTitle(){
  const t=document.querySelector(".title");
  const l=t.innerText.length;
  if(l>28)t.style.fontSize="54px";
  else if(l>20)t.style.fontSize="64px";
  else t.style.fontSize="78px";
}

function render(){
  const format=v("format");
  $("card").innerHTML=`
    <img src="logo.png" class="watermark">

    <div class="content">
      <div class="hook">${v("hook")||"LOW CAL • HIGH PROTEIN"}</div>
      <div class="title">${v("name")||"MAXI KING BOWL"}</div>
      <div class="subtitle">${v("subtitle")||"High Protein Dessert"}</div>

      <div class="kcal-badge">
        <div class="kcal">${v("kcal")||"317"}</div>
        <div class="kcal-label">KCAL</div>
      </div>

      ${
        format==="card" ? `
        <div class="macros">
          <div class="macro"><div class="label">PROTEIN</div><div class="value">${v("protein")||"34g"}</div></div>
          <div class="macro"><div class="label">CARBS</div><div class="value">${v("carbs")||"16g"}</div></div>
          <div class="macro"><div class="label">FETT</div><div class="value">${v("fat")||"11g"}</div></div>
        </div>` :
        `<div style="margin-top:100px;font-size:62px;font-weight:1000">${v("protein")||"34g"} PROTEIN</div>`
      }
    </div>

    <div class="footer">@TheMacroDistrict</div>
  `;

  fitTitle();
  resizePreview();
}

function download(){

  render();

  const original = $("card");

  // 🔥 CLONE OHNE SCALE
  const clone = original.cloneNode(true);
  clone.style.transform = "none";
  clone.style.width = "1080px";
  clone.style.height = "1920px";

  clone.style.position = "fixed";
  clone.style.left = "-9999px";
  clone.style.top = "0";

  document.body.appendChild(clone);

  html2canvas(clone, {
    scale:2,
    useCORS:true,
    backgroundColor:null
  }).then(canvas=>{
    const link = document.createElement("a");
    link.download = "tmd.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

    document.body.removeChild(clone); // cleanup
  });
}

window.addEventListener("resize",resizePreview);
render();
</script>

</body>
</html>
