<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMD Macro Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;background:#0b0b0c;color:white;font-family:Arial;padding:20px}
input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:0;font-size:16px}
button{background:#d6b887;font-weight:800;cursor:pointer}
.app{max-width:480px;margin:auto}
.preview{transform:scale(.32);transform-origin:top left;width:1080px;height:1920px;margin-top:25px}
.card{width:1080px;height:1920px;box-sizing:border-box;position:relative;overflow:hidden}
.logo{width:210px;opacity:.18;margin-bottom:70px}
.center{text-align:center}
.title{font-size:86px;font-weight:900;line-height:1.05}
.subtitle{font-size:38px;margin-top:20px}
.kcal{font-size:155px;font-weight:900}
.box{border-radius:55px;padding:60px;margin-top:90px}
.macros{display:flex;gap:24px;margin-top:65px}
.macro{flex:1;border-radius:35px;padding:34px;text-align:center}
.label{font-size:24px;font-weight:800}
.value{font-size:55px;font-weight:900;margin-top:15px}
.extras{font-size:34px;margin-top:70px;text-align:center}
.footer{position:absolute;bottom:90px;left:0;right:0;text-align:center;font-size:30px;font-weight:800}

/* Designs */
.luxury{background:#0d0d0e;color:white;padding:90px}
.luxury .subtitle,.luxury .label{color:#d6b887}
.luxury .box{border:4px solid #d6b887;background:#151515}
.luxury .macro,.luxury .extras{background:#171717;border:1px solid #4a3c2e}
.luxury .footer{color:#8d8277}

.minimal{background:#f6f1e9;color:#111;padding:90px}
.minimal .subtitle,.minimal .label,.minimal .footer{color:#9b7a52}
.minimal .box,.minimal .macro,.minimal .extras{background:white;box-shadow:0 20px 50px rgba(0,0,0,.08)}

.social{background:#101010;color:white;padding:80px}
.social-inner{height:1760px;background:#181818;border-radius:70px;padding:70px;box-sizing:border-box;border:2px solid #2c241c}
.social .subtitle,.social .label{color:#d6b887}
.social .box{background:#d6b887;color:#111}
.social .macro,.social .extras{background:#101010}
.social .footer{color:#8d8277}
</style>
</head>

<body>
<div class="app">
<h1>TMD Macro Generator</h1>

<select id="design">
<option value="luxury">Luxury Dark</option>
<option value="minimal">Minimal Clean</option>
<option value="social">Social Card</option>
</select>

<select id="format">
<option value="card">Nährwerte Card</option>
<option value="reel">Reel Cover</option>
</select>

<input id="name" placeholder="Name z.B. Maxi King Bowl">
<input id="subtitle" placeholder="Untertitel z.B. High Protein Dessert">
<input id="kcal" placeholder="Kalorien z.B. 317">
<input id="protein" placeholder="Protein z.B. 34g">
<input id="carbs" placeholder="Carbs z.B. 16,8g">
<input id="fat" placeholder="Fett z.B. 11,7g">
<input id="extras" placeholder="Extras z.B. 5g Ballaststoffe • 9,5g Zucker">

<button onclick="render()">Vorschau aktualisieren</button>
<button onclick="download()">PNG herunterladen</button>

<div class="preview">
<div id="card" class="card luxury"></div>
</div>
</div>

<script>
function val(id){return document.getElementById(id).value}

function render(){
 const design = val("design");
 const format = val("format");
 const card = document.getElementById("card");

 card.className = "card " + design;

 const content = `
 ${design === "social" ? '<div class="social-inner">' : ''}

 <div class="center">
 <img src="logo.png" class="logo">
 </div>

 <div class="title ${format === "reel" ? "center" : ""}">
 ${val("name") || "Rezeptname"}
 </div>

 <div class="subtitle ${format === "reel" ? "center" : ""}">
 ${val("subtitle") || "High Protein Dessert"}
 </div>

 <div class="box center">
 <div class="kcal">${val("kcal") || "317"}</div>
 <div class="subtitle">kcal</div>
 </div>

 ${
 format === "card" ? `
 <div class="macros">
 <div class="macro"><div class="label">PROTEIN</div><div class="value">${val("protein") || "34g"}</div></div>
 <div class="macro"><div class="label">CARBS</div><div class="value">${val("carbs") || "16,8g"}</div></div>
 <div class="macro"><div class="label">FETT</div><div class="value">${val("fat") || "11,7g"}</div></div>
 </div>

 <div class="extras">${val("extras") || "5g Ballaststoffe • 9,5g Zucker"}</div>
 ` : `
 <div class="extras" style="font-size:58px;font-weight:900;">
 ${val("protein") || "34g"} Protein
 </div>
 `
 }

 <div class="footer">@TheMacroDistrict</div>

 ${design === "social" ? '</div>' : ''}
 `;

 card.innerHTML = content;
}

function download(){
 render();
 html2canvas(document.getElementById("card"), {
   scale: 1,
   useCORS: true,
   backgroundColor: null
 }).then(canvas => {
   const link = document.createElement("a");
   link.download = "tmd-macro-card.png";
   link.href = canvas.toDataURL("image/png");
   link.click();
 });
}

render();
</script>
</body>
</html>
