<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TMD Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#080808;
  --black:#111111;
  --dark:#121212;
  --gold:#cfb083;
  --gold-soft:#d6b887;
  --white:#ffffff;
}

/* BODY */

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:'Manrope', sans-serif;
  padding:18px;
}

/* INPUTS */

input,
button{
  width:100%;
  padding:14px;
  margin:7px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
  font-family:'Manrope', sans-serif;
}

button{
  background:var(--gold-soft);
  color:#111;
  font-weight:800;
  letter-spacing:.3px;
}

/* PREVIEW */

.preview{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  margin-top:20px;
}

.preview-inner{
  width:1080px;
  height:1920px;
  transform-origin:top left;
}

/* CARD */

.card{

  width:1080px;
  height:1920px;

  position:relative;
  overflow:hidden;

  padding:90px 70px;
  box-sizing:border-box;

  background:

    radial-gradient(
      ellipse at 50% -8%,
      rgba(214,184,135,.085) 0%,
      rgba(214,184,135,.050) 18%,
      rgba(214,184,135,.022) 35%,
      rgba(214,184,135,.008) 50%,
      transparent 70%
    ),

    linear-gradient(
      180deg,
      rgba(255,255,255,.012) 0%,
      rgba(255,255,255,0) 28%
    ),

    #080808;
}

/* WATERMARK */

.watermark{
  position:absolute;
  width:1080px;
  opacity:.06;
  top:75%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  filter:brightness(1.04);
}

/* CONTENT */

.content{
  position:relative;
  z-index:2;
  text-align:center;
}

/* HOOK */

.hook{
  display:inline-block;

  padding:18px 34px;

  border-radius:999px;

  font-size:30px;
  font-weight:800;
  letter-spacing:1.8px;

  background:var(--gold);
  color:#111;

  box-shadow:
    0 0 22px rgba(207,176,131,.08);
}

/* TITLE */

.title{
  margin-top:90px;

  font-size:78px;
  font-weight:800;

  line-height:1.02;

  text-transform:uppercase;

  letter-spacing:-2px;
}

/* SUBTITLE */

.subtitle{
  margin-top:24px;

  font-size:42px;
  font-weight:600;

  color:var(--gold);

  opacity:.9;

  letter-spacing:-.5px;
}

/* KCAL SECTION */

.kcal-wrap{
  position:relative;
  margin-top:90px;
}

/* KCAL GLOW */

.kcal-glow{
  position:absolute;

  width:760px;
  height:760px;

  border-radius:50%;

  background:
    radial-gradient(circle,
      rgba(207,176,131,.13) 0%,
      rgba(207,176,131,.09) 20%,
      rgba(207,176,131,.05) 40%,
      rgba(207,176,131,.022) 62%,
      transparent 82%
    );

  filter:blur(18px);

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  z-index:0;
  pointer-events:none;
}

/* KCAL BADGE */

.kcal-badge{
  position:relative;
  z-index:1;

  margin:0 auto;

  width:540px;
  height:540px;

  border-radius:50%;

  background:var(--gold);

  color:#111;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  box-shadow:
    0 0 45px rgba(207,176,131,.15),
    inset 0 0 0 2px rgba(255,255,255,.08);
}

/* KCAL NUMBER */

.kcal{
  font-family:'Bebas Neue', sans-serif;

  font-size:170px;
  font-weight:400;

  line-height:.88;

  letter-spacing:2px;
}

/* KCAL LABEL */

.kcal-label{
  font-size:39px;
  font-weight:800;

  margin-top:14px;

  letter-spacing:.8px;
}

/* PORTION */

.portion{
  font-size:26px;
  font-weight:600;

  margin-top:48px;

  opacity:.82;
}

/* MACROS */

.macros{
  margin-top:75px;

  display:grid;
  grid-template-columns:1fr 1fr 1fr;

  gap:24px;
}

/* MACRO BOX */

.macro{
  background:rgba(18,18,18,.92);

  border:1.5px solid rgba(207,176,131,.22);

  border-radius:999px;

  padding:28px 22px;

  box-shadow:
    0 0 12px rgba(207,176,131,.03);
}

/* LABEL */

.label{
  font-size:19px;
  font-weight:700;

  color:var(--gold);

  opacity:.88;

  letter-spacing:1px;
}

/* VALUE */

.value{
  font-family:'Bebas Neue', sans-serif;

  font-size:58px;
  font-weight:400;

  margin-top:8px;

  line-height:.95;

  letter-spacing:1px;
}

/* FOOTER */

.footer{
  position:absolute;

  bottom:70px;
  left:0;

  width:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:2;
}

.footer-inner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
}

/* ICONS */

.icon{
  width:23px;
  height:23px;

  fill:var(--gold);

  opacity:.72;
}

.youtube{
  width:26px;
  height:26px;
}

/* HANDLE */

.handle{
  font-size:28px;
  font-weight:600;

  opacity:.72;

  margin-left:10px;

  letter-spacing:-.2px;
}

</style>
</head>

<body>

<input id="hook" placeholder="Hook">
<input id="name" placeholder="Name">
<input id="subtitle" placeholder="Untertitel">
<input id="kcal" placeholder="Kalorien">
<input id="portion" placeholder="z.B. pro Portion">
<input id="protein" placeholder="Protein">
<input id="carbs" placeholder="Carbs">
<input id="fat" placeholder="Fat">

<button onclick="render()">Vorschau</button>
<button onclick="download()">Download PNG</button>

<div class="preview">
  <div class="preview-inner" id="previewInner">
    <div id="card" class="card"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const v = id => $(id).value.trim();

function gram(id){
  const value = v(id);
  if(!value) return "";
  return value.toLowerCase().includes("g") ? value : value + "g";
}

function resizePreview(){
  const scale = Math.min((window.innerWidth-40)/1080,0.55);
  const el = $("previewInner");
  el.style.transform = `scale(${scale})`;
  el.style.width = `${1080*scale}px`;
  el.style.height = `${1920*scale}px`;
}

function cleanFilename(name){
  return name.toLowerCase().trim()
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-+|-+$/g,"");
}

function render(){
  const hook = v("hook") ? `<div class="hook">${v("hook")}</div>` : "";
  const title = v("name") ? `<div class="title">${v("name")}</div>` : "";
  const subtitle = v("subtitle") ? `<div class="subtitle">${v("subtitle")}</div>` : "";

  const kcalBox = v("kcal") ? `
    <div class="kcal-wrap">
      <div class="kcal-glow"></div>
      <div class="kcal-badge">
        <div class="kcal">${v("kcal")}</div>
        <div class="kcal-label">KCAL</div>
        ${v("portion") ? `<div class="portion">${v("portion")}</div>` : ""}
      </div>
    </div>
  ` : "";

  const macros = (v("protein") || v("carbs") || v("fat")) ? `
  <div class="macros">
    ${v("protein") ? `<div class="macro"><div class="label">PROTEIN</div><div class="value">${gram("protein")}</div></div>` : ""}
    ${v("carbs") ? `<div class="macro"><div class="label">CARBS</div><div class="value">${gram("carbs")}</div></div>` : ""}
    ${v("fat") ? `<div class="macro"><div class="label">FAT</div><div class="value">${gram("fat")}</div></div>` : ""}
  </div>
` : "";

  $("card").innerHTML = `
    <img src="watermark.png" class="watermark">

    <div class="content">
      ${hook}
      ${title}
      ${subtitle}
      ${kcalBox}
      ${macros}
    </div>

    <div class="footer">
      <div class="footer-inner">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="4" y="4" width="16" height="16" rx="5"/>
          <circle cx="12" cy="12" r="4" fill="#080808"/>
          <circle cx="17" cy="7" r="1.5" fill="#080808"/>
        </svg>

        <svg class="icon" viewBox="0 0 24 24">
          <path d="M14 3v9a4 4 0 11-3-3.87V10a2 2 0 102 1.73V3h1z"/>
        </svg>

        <svg class="icon youtube" viewBox="0 0 24 24">
          <rect x="2" y="6" width="20" height="12" rx="4" fill="#d6b887"/>
          <polygon points="10,9 16,12 10,15" fill="#080808"/>
        </svg>

        <span class="handle">@TheMacroDistrict</span>
      </div>
    </div>
  `;

  resizePreview();
}

function download(){
  render();

  const clone = $("card").cloneNode(true);
  clone.style.position = "fixed";
  clone.style.left = "-9999px";
  clone.style.width = "1080px";
  clone.style.height = "1920px";
  document.body.appendChild(clone);

  html2canvas(clone,{scale:2,useCORS:true}).then(canvas=>{
    const link=document.createElement("a");
    link.download = cleanFilename(v("name") || "tmd-card") + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    document.body.removeChild(clone);
  });
}

window.addEventListener("resize",resizePreview);
render();
</script>

</body>
</html>
